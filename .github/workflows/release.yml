name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build pkg binaries
        run: npm run build:binaries

      - name: Prepare release assets
        run: |
          ls -la dist/
          # pkg 6.x already emits *-linux-x64 / *-macos-x64 names; normalize Windows only
          if [ -f dist/deployhub-win-x64.exe ]; then
            mv dist/deployhub-win-x64.exe dist/deployhub-win.exe
          fi
          ls -la dist/

      - name: Smoke test binary
        run: ./dist/deployhub-linux-x64 --version

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          cd dist
          sha256sum deployhub-linux-x64 > checksums.txt
          sha256sum deployhub-macos-x64 >> checksums.txt
          sha256sum deployhub-macos-arm64 >> checksums.txt
          sha256sum deployhub-win.exe >> checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/deployhub-linux-x64
            dist/deployhub-macos-x64
            dist/deployhub-macos-arm64
            dist/deployhub-win.exe
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync package version
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update Homebrew formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN secret not set — skipping Homebrew formula update"
            exit 0
          fi

          VERSION="${VERSION#v}"
          LINUX_SHA=$(sha256sum dist/deployhub-linux-x64 | awk '{print $1}')
          MACOS_SHA=$(sha256sum dist/deployhub-macos-x64 | awk '{print $1}')
          MACOS_ARM_SHA=$(sha256sum dist/deployhub-macos-arm64 | awk '{print $1}')

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/Akash-Chowdhury-24/homebrew-deployhub.git" tap
          cd tap

          sed -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
              -e "s/LINUX_SHA_PLACEHOLDER/${LINUX_SHA}/g" \
              -e "s/MACOS_SHA_PLACEHOLDER/${MACOS_SHA}/g" \
              -e "s/MACOS_ARM_SHA_PLACEHOLDER/${MACOS_ARM_SHA}/g" \
              "${GITHUB_WORKSPACE}/.github/homebrew-formula.template.rb" > Formula/deployhub.rb

          git config user.name "DeployHub Release Bot"
          git config user.email "release@deployhub.local"
          git add Formula/deployhub.rb
          git commit -m "deployhub ${VERSION}"
          git push origin main
